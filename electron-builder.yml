appId: com.lygodactylus.app
productName: Lygodactylus
copyright: Copyright © 2026 Lygodactylus

directories:
  output: release
  buildResources: resources

npmRebuild: true
afterPack: ./scripts/after-pack.js
afterAllArtifactBuild: ./scripts/compress-dmg.js

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/chat-lan/**/*
  - package.json
  - scripts/lib/node-runtime.mjs
  - scripts/lib/python-runtime.mjs
  - scripts/lib/gui-tools-runtime.mjs
  - node_modules/better-sqlite3/**/*
  - node_modules/@anthropic-ai/sdk/**/*
  - node_modules/openai/**/*
  - node_modules/@modelcontextprotocol/**/*
  - node_modules/electron-updater/**/*
  - node_modules/chokidar/**/*
  - node_modules/archiver/**/*
  - node_modules/glob/**/*
  - node_modules/dotenv/**/*
  - node_modules/bufferutil/**/*
  - node_modules/utf-8-validate/**/*
  # Exclude non-essential files from node_modules to reduce bundle size
  - '!**/*.js.map'
  - '!**/*.mjs.map'
  - '!**/*.d.ts.map'
  - '!**/*.mts.map'
  - '!**/*.d.ts'
  - '!**/*.ts'
  - '!**/README.md'
  - '!**/CHANGELOG.md'
  - '!**/CHANGELOG'
  - '!**/LICENSE'
  - '!**/LICENSE.md'
  - '!**/.npmignore'
  - '!**/.eslintrc*'
  - '!**/tsconfig.json'

# MCP servers and platform-specific resources are declared in each platform's
# extraResources section below (win/mac/linux).

# Skills are extracted via extraResources (per-platform) to avoid asar symlink issues.
# Note: MCP servers are bundled with esbuild (all deps inlined), so no need to unpack MCP SDK
asarUnpack:
  - node_modules/better-sqlite3/**/*.node
  - node_modules/bufferutil/**/*.node
  - node_modules/utf-8-validate/**/*.node

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Lygodactylus-${version}-win-${arch}.${ext}
  extraResources:
    - from: resources/icon.ico
      to: icon.ico
    - from: resources/tray-icon.png
      to: tray-icon.png
    - from: resources/tray-icon.ico
      to: tray-icon.ico
    - from: .bundle-resources/mcp
      to: mcp
    - from: dist-wsl-agent
      to: wsl-agent
    - from: catalog
      to: catalog
    - from: resources/chat-lan
      to: chat-lan

mac:
  icon: resources/icon.icns
  target:
    - target: dir
      arch:
        - arm64
  artifactName: Lygodactylus-${version}-mac-${arch}.${ext}
  identity: auto
  hardenedRuntime: true
  gatekeeperAssess: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    LSApplicationCategoryType: public.app-category.developer-tools
    NSScreenCaptureUsageDescription: 'Lygodactylus needs screen recording access for GUI automation.'
    NSAccessibilityUsageDescription: 'Lygodactylus needs accessibility access for GUI automation.'
  extraResources:
    - from: resources/icon.icns
      to: icon.icns
    - from: resources/tray-iconTemplate.png
      to: tray-iconTemplate.png
    - from: .bundle-resources/mcp
      to: mcp
    - from: dist-lima-agent
      to: lima-agent
    - from: catalog
      to: catalog
    - from: resources/chat-lan
      to: chat-lan

linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: Lygodactylus-${version}-linux-${arch}.${ext}
  extraResources:
    - from: resources/icon.png
      to: icon.png
    - from: resources/tray-icon.png
      to: tray-icon.png
    - from: .bundle-resources/mcp
      to: mcp
    - from: catalog
      to: catalog
    - from: resources/chat-lan
      to: chat-lan

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Lygodactylus
  include: installer.nsh
  warningsAsErrors: false
  # Preserve user config/history by default; offer explicit cleanup tooling instead of destructive uninstall.
  deleteAppDataOnUninstall: false

dmg:
  # Explicit size to avoid dmgbuild "No space left on device" for large apps.
  # The temporary writable DMG is auto-shrunk after copying, so this doesn't
  # affect final DMG size. Our ULMO compression hook further reduces it.
  size: '3g'
  window:
    width: 600
    height: 440
  contents:
    - x: 150
      y: 220
      name: 'Lygodactylus.app'
    - x: 450
      y: 220
      type: link
      path: /Applications
      name: 'Applications'

extraMetadata:
  main: dist-electron/main/index.js

# Update metadata (latest.yml) is generated on Windows builds for electron-updater.
# Targets the EE fork releases only — macOS builds stay unsigned and skip auto-update.
publish:
  provider: github
  owner: Emilien-Etadam
  repo: lygodactylus
